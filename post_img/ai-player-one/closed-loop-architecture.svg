<svg width="1600" height="980" viewBox="0 0 1600 980" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f2937"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#94a3b8"/>
    </marker>
    <marker id="arrowAccent" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#f59e0b"/>
    </marker>
    <style>
      .title{font:700 40px -apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif;fill:#f8fafc}
      .subtitle{font:500 18px -apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif;fill:#cbd5e1}
      .h{font:700 26px -apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif;fill:#f8fafc}
      .b{font:500 18px -apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif;fill:#e5e7eb}
      .s{font:500 16px -apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif;fill:#cbd5e1}
      .tag{font:700 15px -apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif;fill:#0f172a}
      .small{font:600 15px -apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif;fill:#e2e8f0}
    </style>
  </defs>

  <rect width="1600" height="980" fill="url(#bg)"/>
  <text x="70" y="78" class="title">从“看图 + 推理 + 点击”到一个真正的闭环系统</text>
  <text x="70" y="114" class="subtitle">Disco Elysium AI Player · 一个多模态 GUI Agent 的实际架构</text>

  <rect x="60" y="150" rx="28" ry="28" width="1480" height="760" fill="none" stroke="#334155" stroke-width="2" stroke-dasharray="10 10"/>

  <!-- Cards -->
  <g filter="url(#shadow)">
    <rect x="110" y="240" rx="28" ry="28" width="250" height="180" fill="url(#card)" stroke="#60a5fa" stroke-width="2"/>
    <rect x="430" y="240" rx="28" ry="28" width="250" height="180" fill="url(#card)" stroke="#34d399" stroke-width="2"/>
    <rect x="750" y="240" rx="28" ry="28" width="250" height="180" fill="url(#card)" stroke="#f59e0b" stroke-width="2"/>
    <rect x="1070" y="240" rx="28" ry="28" width="250" height="180" fill="url(#card)" stroke="#f472b6" stroke-width="2"/>

    <rect x="270" y="560" rx="28" ry="28" width="280" height="190" fill="url(#card)" stroke="#a78bfa" stroke-width="2"/>
    <rect x="660" y="560" rx="28" ry="28" width="280" height="190" fill="url(#card)" stroke="#22d3ee" stroke-width="2"/>
    <rect x="1050" y="560" rx="28" ry="28" width="280" height="190" fill="url(#card)" stroke="#f87171" stroke-width="2"/>
  </g>

  <!-- Top row content -->
  <text x="145" y="285" class="h">1. 感知层</text>
  <text x="145" y="323" class="b">截图 / 裁剪 / OCR</text>
  <text x="145" y="353" class="b">场景分类 / UI 提取</text>
  <text x="145" y="392" class="s">输入：游戏画面</text>

  <text x="465" y="285" class="h">2. 观察层</text>
  <text x="465" y="323" class="b">VLM 生成观察</text>
  <text x="465" y="353" class="b">补充可点击目标与坐标</text>
  <text x="465" y="392" class="s">输出：结构化 observation</text>

  <text x="785" y="285" class="h">3. 决策层</text>
  <text x="785" y="323" class="b">LLM / Policy 推理</text>
  <text x="785" y="353" class="b">选择 click / key / none</text>
  <text x="785" y="392" class="s">输出：action plan</text>

  <text x="1105" y="285" class="h">4. 执行层</text>
  <text x="1105" y="323" class="b">鼠标点击 / 键盘输入</text>
  <text x="1105" y="353" class="b">前台校验 / 失败重试</text>
  <text x="1105" y="392" class="s">作用：改变游戏状态</text>

  <!-- Bottom row content -->
  <text x="305" y="605" class="h">5. 状态与记忆</text>
  <text x="305" y="643" class="b">trace / record / memory</text>
  <text x="305" y="673" class="b">长期上下文持久化</text>
  <text x="305" y="712" class="s">避免 agent 每帧失忆</text>

  <text x="695" y="605" class="h">6. 监控与调试</text>
  <text x="695" y="643" class="b">monitor UI / 日志 / 可视化</text>
  <text x="695" y="673" class="b">人工排查 OCR、点击、状态偏差</text>
  <text x="695" y="712" class="s">让问题变得“可观察”</text>

  <text x="1085" y="605" class="h">7. 自修复与安全</text>
  <text x="1085" y="643" class="b">auto patch / guardrails / rollback</text>
  <text x="1085" y="673" class="b">限制改动范围，防止越修越坏</text>
  <text x="1085" y="712" class="s">让系统可持续演化</text>

  <!-- Arrows main loop -->
  <path d="M360 330 L430 330" stroke="#94a3b8" stroke-width="6" fill="none" marker-end="url(#arrow)"/>
  <path d="M680 330 L750 330" stroke="#94a3b8" stroke-width="6" fill="none" marker-end="url(#arrow)"/>
  <path d="M1000 330 L1070 330" stroke="#94a3b8" stroke-width="6" fill="none" marker-end="url(#arrow)"/>

  <!-- feedback loop -->
  <path d="M1195 420 C1240 500, 1245 560, 1160 620" stroke="#f59e0b" stroke-width="6" fill="none" marker-end="url(#arrowAccent)"/>
  <path d="M1050 655 L940 655" stroke="#94a3b8" stroke-width="6" fill="none" marker-end="url(#arrow)"/>
  <path d="M660 655 L550 655" stroke="#94a3b8" stroke-width="6" fill="none" marker-end="url(#arrow)"/>
  <path d="M410 560 C410 500, 290 490, 245 420" stroke="#94a3b8" stroke-width="6" fill="none" marker-end="url(#arrow)"/>

  <!-- side feedback arrows -->
  <path d="M540 560 C560 500, 620 455, 720 420" stroke="#22d3ee" stroke-width="5" fill="none" marker-end="url(#arrow)"/>
  <path d="M1180 560 C1170 510, 1160 470, 1160 420" stroke="#f87171" stroke-width="5" fill="none" marker-end="url(#arrow)"/>
  <path d="M820 560 C810 505, 845 470, 875 420" stroke="#22d3ee" stroke-width="5" fill="none" marker-end="url(#arrow)"/>

  <!-- labels -->
  <rect x="640" y="170" rx="18" ry="18" width="320" height="42" fill="#fde68a"/>
  <text x="682" y="198" class="tag">主循环：看见 → 理解 → 决策 → 执行</text>

  <rect x="1120" y="455" rx="18" ry="18" width="210" height="40" fill="#fed7aa"/>
  <text x="1153" y="482" class="tag">环境反馈回流</text>

  <rect x="665" y="790" rx="18" ry="18" width="270" height="40" fill="#bae6fd"/>
  <text x="700" y="817" class="tag">调试与可观测性支撑闭环</text>

  <rect x="1060" y="790" rx="18" ry="18" width="270" height="40" fill="#fecaca"/>
  <text x="1099" y="817" class="tag">安全边界防止系统自毁</text>

  <text x="70" y="945" class="small">核心观点：这已经不是单纯的 Prompt Engineering，而是一个多层耦合的软件系统。</text>
</svg>